<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Informal Solutions</title>
  <style>
    body {
      margin: 0;
      font-family: monospace;
      background: #fff;
      color: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 40px; }
    h2 { font-weight: normal; font-size: 1.4rem; margin-bottom: 16px; }
    p { font-size: 0.85rem; color: #333; line-height: 1.7; margin-bottom: 40px; }
    .buttons { display: flex; gap: 12px; justify-content: center; }
    a {
      background: rgba(200,200,200,0.85);
      border-radius: 999px;
      padding: 8px 18px;
      font-family: monospace;
      font-size: 0.95rem;
      color: #111;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Thank you for your submission!</h2>
    <p>We'll review your photo and may add it to the collection.</p>
    <div class="buttons">
      <a href="/">Back to the grid</a>
      <a href="/submit">Submit another</a>
    </div>
  </div>
</body>
</html>
